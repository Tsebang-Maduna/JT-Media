<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- custom style -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Admin Panel</h1>

<div class="container my-4">
  <h2>Add Match</h2>
  <form id="match-form" class="row g-3">
    <div class="col-md-6">
      <input type="text" class="form-control" id="home" placeholder="Home Team" required>
    </div>
    <div class="col-md-6">
      <input type="text" class="form-control" id="away" placeholder="Away Team" required>
    </div>
    <div class="col-md-3">
      <input type="number" class="form-control" id="homeScore" placeholder="Home Score" required>
    </div>
    <div class="col-md-3">
      <input type="number" class="form-control" id="awayScore" placeholder="Away Score" required>
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary w-100">Add Match</button>
    </div>
  </form>
</div>

<script type="module" src="js/admin.js"></script>
<script type="module" src="js/firebase.js"></script>
<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
