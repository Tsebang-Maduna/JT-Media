<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Admin Panel</h1>

<form id="match-form">
  <input type="text" id="home" placeholder="Home Team" required>
  <input type="text" id="away" placeholder="Away Team" required>
  <input type="number" id="homeScore" placeholder="Home Score" required>
  <input type="number" id="awayScore" placeholder="Away Score" required>

  <button type="submit">Add Match</button>
</form>

<script type="module" src="js/admin.js"></script>
<script type="module" src="js/firebase.js"></script>
</body>
</html>
