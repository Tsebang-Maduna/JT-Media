    <!-- custom style -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">JT-Media</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<h1>Admin Panel</h1>

<div class="container my-4">
  <h3 class="mb-3">Add Match</h3>

  <form id="match-form" class="row g-3">

    <div class="col-12 col-md-6">
      <input type="text" class="form-control" id="home" placeholder="Home Team" required>
    </div>

    <div class="col-12 col-md-6">
      <input type="text" class="form-control" id="away" placeholder="Away Team" required>
    </div>

    <div class="col-6">
      <input type="number" class="form-control" id="homeScore" placeholder="Home Score" required>
    </div>

    <div class="col-6">
      <input type="number" class="form-control" id="awayScore" placeholder="Away Score" required>
    </div>

    <div class="col-12">
      <button class="btn btn-success w-100">Add Match</button>
    </div>

  </form>
</div>

<script type="module" src="js/admin.js"></script>
<script type="module" src="js/firebase.js"></script>
<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
